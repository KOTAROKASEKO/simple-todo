<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimpleTodo Companion</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div>
          <h1>SimpleTodo</h1>
          <p class="subtitle">Extension side panel</p>
        </div>
        <div class="header-actions">
          <button id="logoutBtn" class="ghost" type="button" hidden>Log out</button>
        </div>
      </header>

      <p id="loadingText">Loading account...</p>

      <section id="authSection" hidden>
        <label class="field">
          <span>Email</span>
          <input id="emailInput" type="email" autocomplete="email" placeholder="you@example.com" />
        </label>
        <label class="field">
          <span>Password</span>
          <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Password" />
        </label>
        <button id="authSubmitBtn" type="button">Sign in</button>
        <button id="switchModeBtn" class="ghost" type="button">Create account</button>
        <p id="authError" class="error" hidden></p>
      </section>

      <section id="todoSection" hidden>
        <section id="tasksView">
          <section class="calendar-panel">
            <div class="calendar-header">
              <button id="calendarPrevBtn" class="icon-btn calendar-nav-btn" type="button" aria-label="Previous day">‹</button>
              <p id="calendarMonthLabel" class="calendar-month-label"></p>
              <button id="calendarNextBtn" class="icon-btn calendar-nav-btn" type="button" aria-label="Next day">›</button>
            </div>
            <div id="dateStrip" class="date-strip" role="tablist" aria-label="Select date"></div>
          </section>

          <ul id="taskList"></ul>

          <div id="composerBackdrop" class="composer-backdrop" hidden></div>
          <section id="composerPanel" class="composer" hidden>
            <div class="composer-header">
              <p id="composerTitleText" class="composer-title">Add task</p>
              <button id="closeComposerBtn" class="ghost composer-close-btn" type="button">Back</button>
            </div>
            <div class="composer-row">
              <input id="titleInput" type="text" placeholder="Task title" />
            </div>
            <div id="checklistDraftList" class="checklist-draft-list"></div>
            <input id="checklistItemInput" type="text" placeholder="Check list item (press Enter)" />
            <label class="switch-row">
              <input id="repeatDailyCheckbox" type="checkbox" />
              <span>Repeat daily</span>
            </label>
            <label class="switch-row">
              <input id="reminderToggle" type="checkbox" />
              <span>Add reminder</span>
            </label>
            <div class="composer-row">
              <button id="addTaskBtn" type="button">Save</button>
            </div>
            <input id="dateInput" type="date" hidden />
            <div id="reminderTimeWrap" hidden>
              <input id="reminderTimeInput" type="time" value="09:00" />
            </div>
          </section>
          <button id="addTaskFab" class="add-task-fab" type="button" aria-label="Add task">+</button>
        </section>

        <section id="journalView" hidden>
          <ul id="journalList" class="journal-list"></ul>
          <div id="journalComposerBackdrop" class="composer-backdrop" hidden></div>
          <section id="journalComposerPanel" class="composer" hidden>
            <div class="composer-header">
              <p class="composer-title">Add journal</p>
              <button id="closeJournalComposerBtn" class="ghost composer-close-btn" type="button">Back</button>
            </div>
            <input id="journalTitleInput" type="text" placeholder="Journal title" />
            <textarea id="journalBodyInput" placeholder="Write your journal"></textarea>
            <div class="composer-row">
              <button id="saveJournalBtn" type="button">Save</button>
            </div>
          </section>
          <button id="addJournalFab" class="add-task-fab" type="button" aria-label="Add journal">+</button>
        </section>

        <section class="bottom-tabbar">
          <button id="tasksTabBtn" class="tab-btn active" type="button">Tasks</button>
          <button id="journalTabBtn" class="tab-btn" type="button">Journal</button>
        </section>
      </section>
    </main>

    <div id="taskActionBackdrop" class="sheet-backdrop" hidden></div>
    <section id="taskActionSheet" class="sheet task-action-sheet" hidden>
      <ul id="taskActionChecklist" class="sheet-checklist"></ul>
      <button id="taskActionEditBtn" type="button">Edit</button>
      <button id="taskActionDeleteBtn" type="button">Delete</button>
      <button id="taskActionCancelBtn" class="ghost" type="button">Cancel</button>
    </section>

    <div id="journalDetailBackdrop" class="sheet-backdrop" hidden></div>
    <section id="journalDetailSheet" class="sheet" hidden>
      <p id="journalDetailDate" class="journal-date"></p>
      <p id="journalDetailContent" class="journal-detail-content"></p>
      <button id="journalDetailCloseBtn" class="ghost" type="button">Close</button>
    </section>

    <button id="openWebAppBtn" type="button" hidden>Open web app</button>
    <button id="closeWebAppBtn" type="button" hidden>Close web app</button>
    <section id="webAppSection" hidden></section>

    <script src="popup.js"></script>
  </body>
</html>
